app = 'svjewels'
primary_region = 'ord'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  DATA_DIR = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = '5s'
    interval = '15s'
    method = 'GET'
    timeout = '5s'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[[mounts]]
  source = 'sv_jewels_data'
  destination = '/data'
